version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd Frontend/reporag-frontend
        - npm ci
    build:
      commands:
        - cd Frontend/reporag-frontend
        - npm run build
  artifacts:
    baseDirectory: Frontend/reporag-frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - Frontend/reporag-frontend/node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache'
